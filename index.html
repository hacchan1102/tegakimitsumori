<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>手書き見積書 → Excel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{
  --navy:#2F5597; --navy-d:#21426f; --ink:#1a1f2b; --muted:#697384;
  --line:#e4e7ee; --paper:#f5f6f9; --card:#ffffff; --hanko:#c8362b;
  --grey:#f2f3f6; --ok:#1f7a4d; --ok-bg:#e7f4ec; --warn:#9a6700; --warn-bg:#fcf3da;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:"Noto Sans JP",system-ui,sans-serif;
  color:var(--ink); background:var(--paper);
  line-height:1.6; -webkit-font-smoothing:antialiased;
}
.num{font-family:"Roboto Mono",monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:860px;margin:0 auto;padding:0 18px 140px}

/* header */
header{padding:34px 0 22px;text-align:center}
.mark{
  width:64px;height:64px;margin:0 auto 14px;border:2.5px solid var(--hanko);
  border-radius:50%;display:grid;place-items:center;color:var(--hanko);
  font-weight:900;font-size:20px;letter-spacing:1px;
  transform:rotate(-7deg);box-shadow:0 0 0 4px #fff inset;
}
h1{font-size:26px;font-weight:900;letter-spacing:.02em;margin:0 0 6px}
header p{margin:0;color:var(--muted);font-size:14px}

/* uploader */
.drop{
  background:var(--card);border:2px dashed #c4cad8;border-radius:16px;
  padding:38px 22px;text-align:center;transition:border-color .15s,background .15s;
  position:relative;
}
.drop.hot{border-color:var(--navy);background:#f3f7ff}
.drop .big{font-size:16px;font-weight:700;margin:0 0 4px}
.drop .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{
  appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;
  font-size:14px;border-radius:10px;padding:11px 18px;transition:transform .08s,background .15s,box-shadow .15s;
}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--navy);color:#fff}
.btn.primary:hover{background:var(--navy-d)}
.btn.ghost{background:var(--grey);color:var(--ink)}
.btn.ghost:hover{background:#e7e9ef}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.hint{margin:14px 2px 0;color:var(--muted);font-size:12px;text-align:center}

/* status */
.queue{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.qitem{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px;
}
.qitem img{width:42px;height:42px;object-fit:cover;border-radius:7px;border:1px solid var(--line)}
.spin{width:16px;height:16px;border:2px solid #cfd6e4;border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.qitem .st{margin-left:auto;color:var(--muted)}
.qitem.err{border-color:#e7b4ae;background:#fdf3f1}
.qitem.err .st{color:var(--hanko)}

/* result card */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  margin-top:18px;overflow:hidden;box-shadow:0 1px 2px rgba(20,30,60,.04);
  animation:rise .3s ease both;
}
.combine-bar{
  display:flex;align-items:center;gap:12px;background:#eef2fb;border:1px solid #c9d7f2;
  border-radius:12px;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--navy-d);
}
.combine-bar span{flex:1}
.combine-bar .btn{white-space:nowrap;padding:9px 16px;font-size:13px}
tr.hdrrow td{background:#eef2fb;border-top:2px solid var(--navy);border-bottom:1px solid var(--line);padding:6px 6px}
tr.hdrrow input{font-weight:700;color:var(--navy-d);background:transparent;border:0;width:100%;font-size:12.5px}
tr.hdrrow input:focus{outline:2px solid #bcd0f5;border-radius:6px}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chead{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.chead .ven{font-weight:700;font-size:15px;flex:1;min-width:0}
.chead .ven span{display:block;color:var(--muted);font-weight:400;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chead .cardthumb{width:40px;height:40px;object-fit:cover;border-radius:8px;border:1px solid var(--line);flex:none}
.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
.badge.ok{color:var(--ok);background:var(--ok-bg)}
.badge.warn{color:var(--warn);background:var(--warn-bg)}
.x-del{appearance:none;border:0;background:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px 6px;border-radius:8px;line-height:1}
.x-del:hover{background:var(--grey);color:var(--hanko)}

.meta{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;padding:12px 16px;border-bottom:1px solid var(--line)}
.fld{display:flex;flex-direction:column;gap:3px;padding:6px 0}
.fld label{font-size:11px;color:var(--muted);font-weight:500}
.fld input{
  font-family:inherit;font-size:13px;color:var(--ink);border:1px solid var(--line);
  border-radius:8px;padding:7px 9px;background:#fff;width:100%;
}
.fld input:focus{outline:2px solid #bcd0f5;border-color:var(--navy)}

/* items table */
.tbl{width:100%;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
th{background:var(--navy);color:#fff;font-weight:700;font-size:12px;padding:8px 6px;text-align:center}
td{border-bottom:1px solid var(--line);padding:3px 4px;vertical-align:middle}
td.no{text-align:center;color:var(--muted);width:34px}
tr.unc td{background:#fcf3da50}
td.numflag{background:#fcf3da50}
.flag{display:inline-block;color:var(--warn);font-weight:700;font-size:10.5px;margin-left:4px;white-space:nowrap}
td.amt{position:relative}
td.amt .flag{display:block;margin:2px 0 0;text-align:right}
td input{
  font-family:inherit;font-size:13px;border:1px solid transparent;border-radius:6px;
  padding:6px 7px;width:100%;background:transparent;color:inherit;
}
td input:hover{background:#f7f8fb}
td input:focus{outline:2px solid #bcd0f5;background:#fff}
td.r input{text-align:right;font-family:"Roboto Mono",monospace}
td.c input{text-align:center}
td.amt{text-align:right;font-family:"Roboto Mono",monospace;padding-right:10px;white-space:nowrap}
.addrow{appearance:none;border:0;background:none;color:var(--navy);font-weight:700;font-size:12px;cursor:pointer;padding:9px 16px}
.addrow:hover{text-decoration:underline}

.totals{padding:12px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.totals .row{display:flex;gap:16px;font-size:13px;color:var(--muted)}
.totals .row .v{font-family:"Roboto Mono",monospace;color:var(--ink);min-width:96px;text-align:right}
.totals .grand{font-size:16px;font-weight:900;color:var(--ink)}
.totals .grand .v{color:var(--navy)}
.recon{font-size:12px;margin-top:4px}
.recon.ok{color:var(--ok)}
.recon.warn{color:var(--warn)}

/* action bar */
.bar{
  position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);border-top:1px solid var(--line);
  padding:12px 18px;display:flex;align-items:center;gap:14px;justify-content:center;
  transform:translateY(110%);transition:transform .25s;
}
.bar.show{transform:none}
.bar .cnt{font-size:13px;color:var(--muted)}
.bar .btn{font-size:15px;padding:12px 26px}

footer{text-align:center;color:var(--muted);font-size:11.5px;margin-top:30px;line-height:1.7}
.toast{
  position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:560px){.meta{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">見積</div>
    <h1>手書き見積書 → Excel</h1>
    <p>手書きの見積書を撮って読み込むだけ。整ったExcelで書き出します。</p>
  </header>

  <div class="drop" id="drop">
    <p class="big">画像・PDFをここにドラッグ＆ドロップ</p>
    <p class="sub">JPEG（.jpg/.jpeg）・PNG・PDF / 複数枚OK（1ファイル＝1見積書として処理します）</p>
    <div class="btn-row">
      <button class="btn primary" id="pick">ファイルを選ぶ</button>
      <button class="btn ghost" id="cam">写真を撮る</button>
    </div>
    <input id="file" type="file" accept="image/jpeg,image/jpg,image/png,image/heic,image/heif,application/pdf,.jpg,.jpeg,.png,.heic,.heif,.pdf" multiple hidden>
    <input id="capture" type="file" accept="image/*" capture="environment" hidden>
  </div>
  <p class="hint">読み取りは自動。金額は手書きの合計と自動照合し、内容はその場で直せます。</p>

  <div class="queue" id="queue"></div>
  <div id="combineBanner"></div>
  <div id="results"></div>

  <footer>
    画像の読み取りにAIを使用します。書き出しはお使いの端末内で生成され、Excelとして保存されます。<br>
    読み取り結果は必ず原本と照合してください。
  </footer>
</div>

<div class="bar" id="bar">
  <span class="cnt" id="cnt"></span>
  <button class="btn primary" id="export">Excelで書き出す</button>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   APIエンドポイント
   - このチャット内プレビュー / テスト: 直接Anthropicを使用（キー不要）
   - Vercel等で一般公開する場合: "/api/extract" に変更し、
     同梱の api/extract.js を配置（APIキーは環境変数に置く）
   ============================================================ */
const API_ENDPOINT = "/api/extract";

const PROMPT = `あなたは日本の手書き見積書・請求書を読み取る専門家です。画像/PDFの見積書・請求書を読み取り、JSONのみで返してください（前後の説明やコードフェンスは禁止、ミニファイ化したJSON1個だけ）。

重要: 1つのファイルに複数の見積書・請求書が含まれる場合（左右に2枚並んでいる、複数ページに別々の書類がある等）は、それぞれを別の1件として全て読み取り、estimates配列に入れてください。1件だけの場合も要素1個の配列にしてください。

スキーマ:
{"estimates":[{"addressee":"宛先（〇〇様の会社名や個人名。無ければ空文字）","date":"発行日（原本の表記そのまま。例:令和8年3月6日）","quote_no":"見積番号・請求番号（無ければ空文字）","vendor":["自社情報を判明分だけ。社名,住所,TEL,代表or担当,登録番号 の順。最大5要素"],"subject":"件名（物件名・工事名・部屋番号など。複数件ある場合は区別できる名前を必ず入れる）","items":[{"name":"品名・摘要","qty":数値またはnull,"unit":"単位(式/枚/台/㎡/個など。無ければ空文字)","price":単価の数値またはnull,"amount":金額の数値またはnull,"name_uncertain":品名の判読に自信が無ければtrue,"number_uncertain":数量・単価・金額のいずれかの判読に自信が無ければtrue}],"stated_total":"原本に書かれた税込合計金額の数値。無ければnull","subtotal_hint":"原本に「小計」や「税抜金額」として書かれた数値があればその数値。無ければnull","tax_hint":"原本に「消費税額等」として書かれた数値があればその数値。無ければnull"}]}

読み取り手順（必ず順番に行う。手順の途中経過は出力しない、最終的なJSONだけを出す）:
1. まず品名・数量・単位・単価・金額の各列を、見えたままに読み取る。
2. 手書き数字は特に次の誤読が起きやすいので、字形の特徴（払いの向き、閉じているか開いているか、線の本数）を見比べて再確認する: 0と6、1と7、2と7、3と8、5と6、7と9、100と1000の桁の見落とし。金額欄の末尾が0や00で揃っているかも手がかりにする（多くの日本の見積書では単価・金額はキリの良い数字になりやすい）。
3. 各行で qty と price が両方読めた場合、qty×price を計算し、読み取った amount と一致するか検算する。一致しない場合、qty・price・amountのどれか1つの数字を誤読している可能性が高いので、画像を見比べて最も自然な組み合わせに修正する。
4. 全行の金額を合計し、原本に書かれている小計・消費税額等・税込合計（stated_total）と照合する。差額がある場合、どの行の数字が誤読されていそうか再度画像を確認し、可能なら修正する。修正しても原本と一致しない、または原本の数字自体が不鮮明な場合は、無理に一致させず number_uncertain:true のままにする。
5. 上記を踏まえても読み取りに自信が持てない箇所だけ、name_uncertain / number_uncertain を true にする。自信がある箇所には付けない（付けすぎない）。

その他のルール:
- 数値はカンマや¥を除いた半角数字のみ。
- 単価×数量で金額が出る行は price と qty を入れる。「一式」など単価が無い行は price:null とし amount に金額を入れる。
- 「小計」「消費税」「合計」の行は items に含めない。税込合計は stated_total、税抜小計はsubtotal_hint、消費税額はtax_hintに入れる。
- 物件名や工事名など金額の無い見出し行は subject にまとめ、items には入れない。
- PDFで複数ページある場合、同一の見積書・請求書の続き（明細の続きページ等）であれば1件として統合する。別々の書類が複数含まれる場合は、それぞれをestimates配列の別要素として全て読み取る。`;

const VERIFY_PROMPT_HEAD = `もう一度、この手書き見積書の画像を注意深く見返してください。前回の読み取り結果を下記JSONで示します。この結果を元に計算した税込合計と、原本に書かれた税込合計が一致していません。

前回の読み取り結果:
`;
const VERIFY_PROMPT_TAIL = `

画像内の各行の数字（数量・単価・金額）を1つずつ見比べ、誤読していそうな箇所を特定して修正してください。特に0/6、1/7、2/7、3/8、5/6、7/9の見間違い、桁（0の数）の見落としを重点的に確認してください。修正できた場合はその行の number_uncertain を false に、修正しても確信が持てない場合は true のままにしてください。原本の数字自体が不鮮明で判断できない場合は、無理に合計を合わせようとせず number_uncertain:true にしてください。

前回の読み取り結果と同じ形式（estimatesではなく単一の見積書オブジェクト）のJSONのみを返してください（前後の説明・コードフェンス禁止、ミニファイ化したJSON1個だけ）。`;

const ENDASH='—';
let estimates=[]; // {id, thumb, data}
let uid=0;

const $=s=>document.querySelector(s);
const queue=$('#queue'), results=$('#results'), bar=$('#bar'), cnt=$('#cnt');

/* ---------- upload wiring ---------- */
const drop=$('#drop');
$('#pick').onclick=()=>$('#file').click();
$('#cam').onclick=()=>$('#capture').click();
$('#file').onchange=e=>handleFiles(e.target.files);
$('#capture').onchange=e=>handleFiles(e.target.files);
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot')}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();if(ev!=='dragleave')return;drop.classList.remove('hot')}));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('hot');handleFiles(e.dataTransfer.files)});

async function handleFiles(list){
  const files=[...list].filter(f=>f.type.startsWith('image/')||f.type==='application/pdf');
  for(const f of files) await processOne(f);
}

function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}

// 画像は長辺1600pxに縮小してJPEG化（容量・速度対策）。PDFはそのまま。
async function compress(file){
  const url=await fileToDataURL(file);
  if(file.type==='application/pdf') return url;
  try{
    const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=url});
    const max=1600, scale=Math.min(1,max/Math.max(img.width,img.height));
    if(scale>=1) return url;
    const cv=document.createElement('canvas');
    cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    return cv.toDataURL('image/jpeg',0.93);
  }catch(e){return url}
}

function thumbTag(dataURL,cls){
  if(dataURL.startsWith('data:application/pdf')){
    return `<div class="${cls||''}" style="width:42px;height:42px;border-radius:7px;border:1px solid var(--line);background:#fde8e6;color:var(--hanko);display:grid;place-items:center;font-size:10px;font-weight:800;flex:none">PDF</div>`;
  }
  return `<img class="${cls||''}" src="${dataURL}">`;
}

async function processOne(file){
  const dataURL=await compress(file);
  const qid=++uid;
  const q=document.createElement('div');
  q.className='qitem';q.id='q'+qid;
  q.innerHTML=`${thumbTag(dataURL)}<span>${escapeHtml(file.name)}</span><span class="st"><span class="spin"></span> 読み取り中…</span>`;
  queue.appendChild(q);
  try{
    const b64=dataURL.split(',')[1];
    const media=dataURL.slice(5,dataURL.indexOf(';'))||'image/jpeg';
    const parsed=await extract(b64,media,PROMPT);
    // 新形式 {estimates:[...]} と旧形式（単一オブジェクト）の両対応
    let list=Array.isArray(parsed.estimates)?parsed.estimates:[parsed];
    if(!list.length) throw new Error('見積書を検出できませんでした');
    list.forEach(normalize);

    // 1件だけの場合のみ、合計不一致時の検算パスを実行
    if(list.length===1){
      let data=list[0];
      const t1=calc(data);
      if(data.stated_total!=null && data.stated_total!==t1.total){
        const stq=q.querySelector('.st'); if(stq) stq.innerHTML='<span class="spin"></span> 検算中…';
        try{
          const verifyPrompt=VERIFY_PROMPT_HEAD+JSON.stringify(data)+VERIFY_PROMPT_TAIL;
          const data2raw=await extract(b64,media,verifyPrompt);
          const data2=Array.isArray(data2raw.estimates)?data2raw.estimates[0]:data2raw;
          normalize(data2);
          const t2=calc(data2);
          const before=Math.abs(t1.total-(data.stated_total??t1.total));
          const after=Math.abs(t2.total-(data2.stated_total??t1.total));
          if(after<=before){ data2.reverified=true; list=[data2]; }
        }catch(e){ /* 再確認に失敗しても最初の結果をそのまま使う */ }
      }
    }

    for(const data of list){
      const id=++uid;
      estimates.push({id,thumb:dataURL,data});
      renderCard(id);
    }
    q.remove();
    refreshBar();
    if(list.length>1) toast(`このファイルから${list.length}件の書類を検出しました`);
  }catch(err){
    console.error(err);
    q.classList.add('err');
    q.querySelector('.st').textContent='読み取り失敗：'+(err&&err.message?err.message:'もう一度お試しください');
  }
}

const IS_PREVIEW = API_ENDPOINT.indexOf('api.anthropic.com') !== -1;

async function extract(b64,media,promptText){
  const isPdf=media==='application/pdf';
  const contentBlock=isPdf
    ? {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}
    : {type:"image",source:{type:"base64",media_type:media,data:b64}};
  const body={
    model:"claude-sonnet-4-6",
    max_tokens:IS_PREVIEW?1000:2000, // このチャット内プレビューは1000固定が必須。本番(Vercel)は上限に余裕を持たせる
    messages:[{role:"user",content:[
      contentBlock,
      {type:"text",text:promptText}
    ]}]
  };
  const r=await fetch(API_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  let j;
  try{ j=await r.json(); }catch(e){ throw new Error('レスポンス解析失敗（HTTP '+r.status+'）'); }
  if(!r.ok){
    const msg=(j&&j.error&&j.error.message)?j.error.message:('HTTP '+r.status);
    throw new Error('APIエラー: '+msg);
  }
  const text=(j.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
  const s=text.indexOf("{"), e=text.lastIndexOf("}");
  if(s<0||e<0) throw new Error("JSON解析失敗: "+text.slice(0,120));
  return JSON.parse(text.slice(s,e+1));
}

/* ---------- model helpers ---------- */
function num(v){if(v===null||v===undefined||v==='')return null;const n=Number(String(v).replace(/[^0-9.\-]/g,''));return isNaN(n)?null:n}
function normalize(d){
  d.addressee=d.addressee||''; d.date=d.date||''; d.quote_no=d.quote_no||'';
  d.subject=d.subject||''; d.vendor=Array.isArray(d.vendor)?d.vendor:[];
  d.stated_total=num(d.stated_total);
  d.subtotal_hint=num(d.subtotal_hint); d.tax_hint=num(d.tax_hint);
  d.items=(d.items||[]).map(it=>(it.isHeader?{
    name:it.name||'', unit:'', qty:null, price:null, amount:null,
    name_uncertain:false, number_uncertain:false, isHeader:true
  }:{
    name:it.name||'', unit:it.unit||'',
    qty:num(it.qty), price:num(it.price), amount:num(it.amount),
    name_uncertain:!!it.name_uncertain,
    number_uncertain:!!(it.number_uncertain||it.uncertain)
  }));
}
function lineAmt(it){
  if(it.isHeader) return 0;
  if(it.qty!=null&&it.price!=null) return it.qty*it.price;
  return it.amount!=null?it.amount:0;
}
function calc(d){
  const sub=d.items.reduce((s,it)=>s+lineAmt(it),0);
  const tax=Math.round(sub*0.1);
  return {sub,tax,total:sub+tax};
}
const yen=n=>'¥'+Math.round(n).toLocaleString('ja-JP');

/* ---------- render ---------- */
function estById(id){return estimates.find(e=>e.id===id)}

function renderCard(id){
  const est=estById(id), d=est.data;
  const c=document.createElement('div');
  c.className='card';c.id='c'+id;
  results.appendChild(c);
  paintCard(c,est);
}

function paintCard(c,est){
  const d=est.data, t=calc(d);
  const recon=reconcile(d,t);
  const ven=d.vendor[0]||'（社名未取得）';
  const sub=d.vendor.slice(1).filter(Boolean).join(' / ');
  c.innerHTML=`
    <div class="chead">
      ${thumbTag(est.thumb,'cardthumb')}
      <div class="ven">${escapeHtml(ven)}<span>${escapeHtml(sub)}</span></div>
      <span class="badge ${recon.cls}">${recon.label}</span>
      <button class="x-del" title="削除">×</button>
    </div>
    <div class="meta">
      ${metaField(est.id,'addressee','宛先',d.addressee)}
      ${metaField(est.id,'subject','件名',d.subject)}
      ${metaField(est.id,'date','発行日',d.date)}
      ${metaField(est.id,'quote_no','見積番号',d.quote_no)}
    </div>
    <div class="tbl">
      <table>
        <thead><tr><th>No.</th><th>品名・摘要</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th></tr></thead>
        <tbody>${(()=>{let no=0;return d.items.map((it,i)=>it.isHeader?headerRow(it,i):itemRow(est.id,it,i,++no)).join('')})()}</tbody>
      </table>
    </div>
    <button class="addrow" data-add>＋ 行を追加</button>
    <div class="totals" id="tot${est.id}">${totalsHtml(d,t,recon)}</div>
  `;
  // wiring
  c.querySelector('.x-del').onclick=()=>{estimates=estimates.filter(e=>e.id!==est.id);c.remove();refreshBar()};
  c.querySelector('[data-add]').onclick=()=>{d.items.push({name:'',unit:'',qty:null,price:null,amount:null,name_uncertain:false,number_uncertain:false,isHeader:false});paintCard(c,est)};
  c.querySelectorAll('input[data-meta]').forEach(inp=>{
    inp.oninput=()=>{d[inp.dataset.meta]=inp.value}
  });
  c.querySelectorAll('input[data-f]').forEach(inp=>{
    inp.oninput=()=>{
      const i=+inp.dataset.i, f=inp.dataset.f;
      const it=d.items[i];
      if(f==='name'||f==='unit') it[f]=inp.value;
      else it[f]=num(inp.value);
      updateRowAmt(c,i,it);
      const t2=calc(d), r2=reconcile(d,t2);
      $('#tot'+est.id).innerHTML=totalsHtml(d,t2,r2);
      const b=c.querySelector('.badge');b.className='badge '+r2.cls;b.textContent=r2.label;
    }
  });
}

function metaField(id,key,label,val){
  return `<div class="fld"><label>${label}</label><input data-meta="${key}" value="${escapeAttr(val||'')}" placeholder="—"></div>`;
}
function headerRow(it,i){
  return `<tr class="hdrrow"><td class="no"></td><td colspan="5"><input data-f="name" data-i="${i}" value="${escapeAttr(it.name)}"></td></tr>`;
}
function itemRow(id,it,i,no){
  const unc=it.name_uncertain||it.number_uncertain;
  return `<tr class="${unc?'unc':''}">
    <td class="no">${no}</td>
    <td><input data-f="name" data-i="${i}" value="${escapeAttr(it.name)}">${it.name_uncertain?'<span class="flag">品名要確認</span>':''}</td>
    <td class="c ${it.number_uncertain?'numflag':''}" style="width:74px"><input data-f="qty" data-i="${i}" value="${it.qty??''}"></td>
    <td class="c" style="width:60px"><input data-f="unit" data-i="${i}" value="${escapeAttr(it.unit)}"></td>
    <td class="r ${it.number_uncertain?'numflag':''}" style="width:96px"><input data-f="price" data-i="${i}" value="${it.price??''}"></td>
    <td class="amt ${it.number_uncertain?'numflag':''}" data-amt="${i}">${num2(lineAmt(it))}${it.number_uncertain?'<span class="flag">金額要確認</span>':''}</td>
  </tr>`;
}
function num2(n){return Number(n||0).toLocaleString('ja-JP')}
function updateRowAmt(c,i,it){const el=c.querySelector(`[data-amt="${i}"]`);if(el)el.textContent=num2(lineAmt(it))}

function totalsHtml(d,t,recon){
  return `
    <div class="row"><span>小計（税抜）</span><span class="v">${num2(t.sub)}</span></div>
    <div class="row"><span>消費税（10%）</span><span class="v">${num2(t.tax)}</span></div>
    <div class="row grand"><span>合計（税込）</span><span class="v">${yen(t.total)}</span></div>
    ${recon.note?`<div class="recon ${recon.cls}">${recon.note}</div>`:''}`;
}
function reconcile(d,t){
  if(d.stated_total==null) return {cls:'warn',label:'合計未取得',note:'原本の税込合計が読み取れませんでした。金額をご確認ください。'};
  if(d.stated_total===t.total){
    return d.reverified
      ? {cls:'ok',label:'合計一致（再確認済）',note:`誤読していた数字を自動で見直し、原本記載の税込合計 ${yen(d.stated_total)} と一致しました。念のため黄色マークの行だけご確認ください。`}
      : {cls:'ok',label:'合計一致',note:`原本記載の税込合計 ${yen(d.stated_total)} と一致しました。`};
  }
  const diff=t.total-d.stated_total;
  const base=`原本の合計 ${yen(d.stated_total)} と ${(diff>0?'+':'')}${num2(diff)}円 ずれています。数量・単価・金額をご確認ください。`;
  return {cls:'warn',label:'要確認',note:d.reverified?base+'（自動での見直し後もこのズレが残っています）':base};
}

/* ---------- export ---------- */
function refreshBar(){
  if(estimates.length){bar.classList.add('show');cnt.textContent=`${estimates.length}件を書き出します`}
  else bar.classList.remove('show');
  renderCombineBanner();
}
$('#export').onclick=exportExcel;

/* ---------- combine multiple estimates into one ---------- */
function renderCombineBanner(){
  const el=$('#combineBanner');
  if(estimates.length>=2){
    el.innerHTML=`<div class="combine-bar">
      <span>${estimates.length}件の書類があります。このまま書き出すと<b>別々のシート</b>になります。1つにまとめることもできます。</span>
      <button class="btn ghost" id="combineBtn">1つにまとめる</button>
    </div>`;
    el.querySelector('#combineBtn').onclick=combineAll;
  } else {
    el.innerHTML='';
  }
}

function mergeEstimates(ests){
  const first=ests[0].data;
  const merged={
    addressee:first.addressee||'', date:first.date||'', quote_no:'',
    vendor:(first.vendor||[]).slice(), subject:'', items:[],
    stated_total:null, subtotal_hint:null, tax_hint:null,
    reverified:ests.some(e=>e.data.reverified)
  };
  let sum=0, missing=false;
  ests.forEach(e=>{
    const d=e.data;
    const label=(d.vendor&&d.vendor[0])?d.vendor[0]:'見積書';
    const headerName='【'+label+'】'+(d.subject?(' '+d.subject):'');
    merged.items.push({name:headerName,unit:'',qty:null,price:null,amount:null,
      name_uncertain:false,number_uncertain:false,isHeader:true});
    d.items.forEach(it=>merged.items.push(Object.assign({},it)));
    if(d.stated_total==null) missing=true; else sum+=d.stated_total;
  });
  merged.stated_total=missing?null:sum;
  return merged;
}

function combineAll(){
  if(estimates.length<2) return;
  const mergedData=mergeEstimates(estimates);
  normalize(mergedData);
  const thumb=estimates[0].thumb;
  const id=++uid;
  estimates=[{id,thumb,data:mergedData}];
  results.innerHTML='';
  renderCard(id);
  refreshBar();
  toast('1つの見積書にまとめました');
}

const NAVY='FF2F5597',GREY='FFF2F2F2',WHITE='FFFFFFFF',LINE='FF999999',MED='FF333333';
const THIN={style:'thin',color:{argb:LINE}};
const box={top:THIN,left:THIN,right:THIN,bottom:THIN};

async function exportExcel(){
  if(!estimates.length)return;
  const wb=new ExcelJS.Workbook();
  const used={};
  estimates.forEach((est,idx)=>{
    let nm=(est.data.vendor[0]||('見積'+(idx+1))).replace(/[\\\/\?\*\[\]:]/g,'').slice(0,28)||('見積'+(idx+1));
    if(used[nm])nm=nm.slice(0,24)+'_'+(++used[nm]); else used[nm]=1;
    buildSheet(wb.addWorksheet(nm,{views:[{showGridLines:false}]}),est.data,idx+1);
  });
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`見積書_${estimates.length}件.xlsx`;a.click();
  URL.revokeObjectURL(url);
  toast('Excelを書き出しました');
}

function buildSheet(ws,d,no){
  const widths=[4,30,8,6,13,14,3];
  widths.forEach((w,i)=>ws.getColumn(i+1).width=w);
  const set=(ref,val,o={})=>{
    const c=ws.getCell(ref);
    if(val!==undefined&&val!==null)c.value=val;
    c.font={name:'Yu Gothic',size:o.size||11,bold:!!o.bold,color:{argb:o.color||'FF000000'}};
    c.alignment={horizontal:o.align||'left',vertical:o.valign||'middle',wrapText:!!o.wrap};
    if(o.fill)c.fill={type:'pattern',pattern:'solid',fgColor:{argb:o.fill}};
    if(o.border)c.border=o.border;
    if(o.num)c.numFmt=o.num;
    return c;
  };
  const t=calc(d);

  ws.mergeCells('A1:G1');
  set('A1','御 見 積 書',{size:24,bold:true,align:'center'});ws.getRow(1).height=40;

  set('E3','見積番号',{size:9,align:'right'});
  set('F3',d.quote_no||'',{size:9,border:{bottom:THIN}});
  set('E4','発行日',{size:9,align:'right'});
  set('F4',d.date||'',{size:9,border:{bottom:THIN}});

  ws.mergeCells('A3:C3');
  set('A3',d.addressee||'',{size:14,bold:true,border:{bottom:MED}});
  set('D3','御中',{size:12,bold:true});ws.getRow(3).height=24;
  set('A5','下記の通りお見積り申し上げます。',{size:10});

  // vendor right
  const vrows=['E6','E7','E8','E9','E10'];
  (d.vendor||[]).slice(0,5).forEach((ln,i)=>{
    ws.mergeCells(`${vrows[i]}:F${6+i}`);
    set(vrows[i],ln,{size:i===0?11:9,bold:i===0});
  });
  ws.mergeCells('G6:G8');
  set('G6','印',{size:8,align:'center',color:'FF999999',border:box});

  // subject/terms left
  const info=(r,label,val,wrap,h)=>{
    ws.mergeCells(`A${r}:B${r}`);
    set(`A${r}`,label,{size:10,bold:true,fill:GREY,align:'center',border:box});
    ws.mergeCells(`C${r}:D${r}`);
    set(`C${r}`,val||'',{size:10,border:box,wrap:wrap});
    ws.getRow(r).height=h||22;
  };
  info(6,'件　名',d.subject,true,30);
  info(7,'お支払期限','');
  info(8,'有効期限','発行日より30日間');

  ws.getRow(11).height=30;
  ws.mergeCells('A11:B11');
  set('A11','お見積金額',{size:13,bold:true,fill:NAVY,color:WHITE,align:'center',border:box});

  const hdr=13;
  [['A','No.'],['B','品名・摘要'],['C','数量'],['D','単位'],['E','単価'],['F','金額']]
    .forEach(([col,name])=>set(`${col}${hdr}`,name,{size:10,bold:true,fill:NAVY,color:WHITE,align:'center',border:box}));
  ws.getRow(hdr).height=22;

  const first=hdr+1;
  let itemNo=0;
  d.items.forEach((it,i)=>{
    const r=first+i;
    if(it.isHeader){
      ws.mergeCells(`A${r}:F${r}`);
      set(`A${r}`,it.name||'',{size:10,bold:true,fill:'FFEAF0FB',align:'left',color:'FF21426F'});
      ws.getRow(r).height=20;
      return;
    }
    itemNo++;
    set(`A${r}`,itemNo,{size:10,align:'center',border:box});
    set(`B${r}`,it.name||'',{size:10,border:box,wrap:true});
    set(`C${r}`,it.qty??'',{size:10,align:'center',border:box,num:'#,##0.##'});
    set(`D${r}`,it.unit||'',{size:10,align:'center',border:box});
    set(`E${r}`,it.price??'',{size:10,align:'right',border:box,num:'#,##0'});
    if(it.qty!=null&&it.price!=null)
      set(`F${r}`,{formula:`C${r}*E${r}`,result:it.qty*it.price},{size:10,align:'right',border:box,num:'#,##0'});
    else
      set(`F${r}`,it.amount??0,{size:10,align:'right',border:box,num:'#,##0'});
    ws.getRow(r).height=20;
  });

  const last=first+d.items.length-1;
  const sub=last+1,tax=last+2,tot=last+3;
  set(`E${sub}`,'小　計',{size:10,bold:true,fill:GREY,align:'center',border:box});
  set(`F${sub}`,{formula:`SUM(F${first}:F${last})`,result:t.sub},{size:10,align:'right',border:box,num:'#,##0'});
  set(`E${tax}`,'消費税（10%）',{size:10,bold:true,fill:GREY,align:'center',border:box});
  set(`F${tax}`,{formula:`ROUND(F${sub}*0.1,0)`,result:t.tax},{size:10,align:'right',border:box,num:'#,##0'});
  set(`E${tot}`,'合　計',{size:11,bold:true,fill:NAVY,color:WHITE,align:'center',border:box});
  set(`F${tot}`,{formula:`F${sub}+F${tax}`,result:t.total},{size:11,bold:true,align:'right',border:box,num:'"¥"#,##0'});

  ws.mergeCells('C11:E11');
  set('C11',{formula:`F${tot}`,result:t.total},{size:16,bold:true,align:'center',border:box,num:'"¥"#,##0'});
  set('F11','（税込）',{size:10,align:'center',border:box});

  const ns=tot+2,ne=ns+3;
  ws.mergeCells(`A${ns}:A${ne}`);
  set(`A${ns}`,'備考',{size:10,bold:true,fill:GREY,align:'center',border:box});
  ws.mergeCells(`B${ns}:F${ne}`);
  const note=d.stated_total!=null&&d.stated_total===t.total
    ? `手書き原本より作成。税込合計 ${yen(t.total)} と一致（税抜${num2(t.sub)}／消費税${num2(t.tax)}）。`
    : `手書き原本より作成。原本との金額照合をご確認ください。`;
  set(`B${ns}`,note,{size:9,border:box,wrap:true,valign:'top'});
  for(let r=ns;r<=ne;r++)ws.getRow(r).height=18;
}

/* ---------- util ---------- */
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function escapeAttr(s){return escapeHtml(s)}
let toastT;
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200)}
</script>
